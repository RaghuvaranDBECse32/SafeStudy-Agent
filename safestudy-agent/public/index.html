<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mastra Projects - SafeStudy Agent</title>
  
  <!-- Sleek Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <nav class="mastra-navbar">
    <div class="nav-left">
      <svg class="hamburger" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      <div class="logo">
        <svg class="mastra-logo" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
          <path d="M12 2L2 22h20L12 2zm0 4.5l6.5 13h-13L12 6.5z"/>
          <!-- Simplified M logo placeholder, we will use a styled M to mimic Mastra -->
        </svg>
        <span class="mastra-title">Mastra Projects</span>
      </div>
    </div>
  </nav>

  <div class="breadcrumb">
    <span class="breadcrumb-item">Your Organization</span>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-item active">SafeStudy Agent</span>
  </div>

  <div class="app-container">
    <header class="app-header">
      <h1>Choose a topic to study</h1>
      <p class="subtitle">Ask your Mastra Agent anything about your Computer Science notes.</p>
    </header>

    <main class="chat-container">
      <div id="chat-history" class="chat-history">
        <div class="message bot">
          <div class="bubble">Hi! I am the SafeStudy Agent. I'm connected to your course notes. Ask me a computer science question!</div>
        </div>
      </div>
    </main>

    <footer class="input-container">
      <form id="chat-form">
        <input type="text" id="question-input" placeholder="Type your question here..." autocomplete="off" required>
        <button type="submit" id="send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
